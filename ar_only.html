<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Wayfinding</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <!-- Blue Arrow (child of camera, always visible) -->
    <a-camera>
      <a-entity id="arrowEntity" position="0 -0.2 -2" scale="0.5 0.5 0.5">

        <!-- Arrow Shaft -->
        <a-box 
          position="0 0 0"
          depth="0.8"
          height="0.05"
          width="0.05"
          color="blue">
        </a-box>

        <!-- Arrow Head -->
        <a-cone
          position="0 0 -0.5"
          radius-bottom="0.12"
          radius-top="0"
          height="0.3"
          rotation="-90 0 0"
          color="blue">
        </a-cone>

      </a-entity>
    </a-camera>
  </a-scene>

  <script>
    // Get the arrow and camera entities
    const arrowEntity = document.getElementById("arrowEntity");
    const scene = document.querySelector("a-scene");
    let camera = null;

    // Wait for scene to load, then get camera
    scene.addEventListener("loaded", () => {
      camera = document.querySelector("a-camera");
      
      // Continuously monitor camera rotation and update arrow orientation
        // Use the camera yaw directly to drive the arrow's local yaw for smooth, continuous movement.
        const updateArrowRotation = () => {
          if (camera) {
            const yawDeg = camera.object3D.rotation.y * (180 / Math.PI); // Camera yaw in degrees

          // Invert sign: positive yaw → arrow rotates left (negative local yaw),
          // negative yaw → arrow rotates right.
          const arrowLocalYaw = Math.max(-90, Math.min(90, -yawDeg));

            arrowEntity.setAttribute("rotation", `0 ${arrowLocalYaw} 0`);
          }
          requestAnimationFrame(updateArrowRotation);
        };

        updateArrowRotation();
    });
  </script>
</body>
</html>
