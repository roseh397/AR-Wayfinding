<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Guidance | Team 3</title>

  <link rel="stylesheet" href="assets/styles.css" />

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>
</head>

<body>

  <!-- UI Overlay -->
  <main class="container">
    <section class="card">
      <header class="header">
        <div class="badge">AR Page</div>
        <h1>Guidance</h1>
        <p class="subtitle">Follow the arrow for navigation.</p>
      </header>

      <div class="content">
        <div class="summary">
          <p><span class="k">Start:</span> <strong id="startLabel">—</strong></p>
          <p><span class="k">Destination:</span> <strong id="destLabel">—</strong></p>
        </div>

        <div class="actions">
          <button id="backBtn" class="button">Back</button>
          <button id="openLandingBtn" class="button ghost">Change Destination</button>
        </div>
      </div>
    </section>
  </main>

  <!-- AR Scene -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <a-camera>
      <a-entity id="arrowEntity" position="0 -0.2 -2" scale="0.5 0.5 0.5">

        <!-- Arrow Shaft -->
        <a-box 
          position="0 0 0"
          depth="0.8"
          height="0.05"
          width="0.05"
          color="blue">
        </a-box>

        <!-- Arrow Head -->
        <a-cone
          position="0 0 -0.5"
          radius-bottom="0.12"
          radius-top="0"
          height="0.3"
          rotation="-90 0 0"
          color="blue">
        </a-cone>

      </a-entity>
    </a-camera>
  </a-scene>

  <!-- Your Navigation Logic -->
  <script src="js/ar.js"></script>

</body>
</html>
