<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Wayfinding</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <!-- Blue Arrow -->
    <a-entity id="arrowEntity" position="0 -0.5 -2">

      <!-- Arrow Shaft -->
      <a-box 
        position="0 0 0"
        depth="0.8"
        height="0.05"
        width="0.05"
        color="blue">
      </a-box>

      <!-- Arrow Head -->
      <a-cone
        position="0 0 -0.5"
        radius-bottom="0.12"
        radius-top="0"
        height="0.3"
        rotation="-90 0 0"
        color="blue">
      </a-cone>

    </a-entity>

    <a-camera></a-camera>
  </a-scene>

  <script>
    // Get the arrow and camera entities
    const arrowEntity = document.getElementById("arrowEntity");
    const scene = document.querySelector("a-scene");
    let camera = null;

    // Wait for scene to load, then get camera
    scene.addEventListener("loaded", () => {
      camera = document.querySelector("a-camera");
      
      // Continuously monitor camera rotation and update arrow position
      const updateArrowPosition = () => {
        if (camera) {
          const rotation = camera.object3D.rotation;
          const yaw = rotation.y; // Camera yaw in radians
          
          // Convert yaw to determine arrow position
          // Positive yaw (camera pans right) → arrow moves left (negative x)
          // Negative yaw (camera pans left) → arrow moves right (positive x)
          const arrowX = Math.sin(yaw) * -1.5; // Inverse direction, farther away
          
          arrowEntity.setAttribute("position", `${arrowX} -0.5 -2`);
        }
        requestAnimationFrame(updateArrowPosition);
      };
      
      updateArrowPosition();
    });
  </script>
</body>
</html>
